<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection Suite 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --neon-primary: #00f3ff;   /* Cyan */
            --neon-accent: #bc13fe;    /* Purple */
            --neon-alert: #ff2a2a;     /* Red */
            --glass-bg: rgba(15, 15, 20, 0.9);
            --glass-border: rgba(255, 255, 255, 0.15);
            --font-ui: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000;
            color: white;
            font-family: var(--font-ui);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Viewport */
        .viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #050505;
        }

        /* Zoom Container - Scales Video & Canvas Together */
        #zoom-container {
            position: relative;
            transform-origin: center center;
            transition: transform 0.2s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        .hud-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid var(--neon-primary);
            backdrop-filter: blur(5px);
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
        }

        /* Collapsible Menu Bar */
        .menu-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .menu-container.collapsed {
            transform: translateY(calc(100% - 10px)); /* Hide mostly */
        }

        /* Toggle Handle */
        .toggle-handle {
            width: 60px;
            height: 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--neon-primary);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .toggle-handle:hover {
            background: var(--neon-primary);
            color: #000;
        }

        /* Menu Content */
        .menu-bar {
            width: 100%;
            background: var(--glass-bg);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 15px 20px 30px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        /* Controls Grid */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 100px;
        }

        .control-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* UI Components */
        .btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn:hover { background: rgba(255,255,255,0.15); border-color: white; }
        
        .btn-primary { background: var(--neon-primary); color: #000; border: none; font-weight: bold; }
        .btn-primary:hover { box-shadow: 0 0 15px var(--neon-primary); }

        .btn-alert { color: var(--neon-alert); border-color: rgba(255, 42, 42, 0.4); }
        .btn-alert:hover { background: var(--neon-alert); color: white; }

        .btn-icon-only { padding: 8px; width: 36px; }

        select, input[type="range"] {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        select:focus { border-color: var(--neon-primary); }

        /* Loader */
        #loader {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: var(--neon-primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="margin-top:15px; color:#666;">Initializing Core Systems...</div>
    </div>

    <div class="viewport">
        <div class="hud-overlay">
            STATUS: <span id="status-text" style="color:var(--neon-primary)">IDLE</span><br>
            OBJECTS: <span id="obj-count">0</span><br>
            CONFIDENCE: <span id="conf-display">60%</span>
        </div>

        <div id="zoom-container">
            <video id="video" muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="menu-container" id="menu-container">
            <button class="toggle-handle" id="toggle-btn">
                <i class="ph ph-caret-down"></i>
            </button>

            <div class="menu-bar">
                
                <div class="control-group">
                    <span class="control-label">Video Source</span>
                    <div class="btn-row">
                        <button class="btn btn-primary" id="cam-btn"><i class="ph ph-camera"></i> Live</button>
                        <label class="btn" style="cursor:pointer">
                            <i class="ph ph-upload-simple"></i> Upload
                            <input type="file" id="file-input" accept="video/*" hidden>
                        </label>
                    </div>
                </div>

                <div class="control-group">
                    <span class="control-label">Zoom</span>
                    <div class="btn-row">
                        <button class="btn btn-icon-only" id="zoom-out"><i class="ph ph-minus"></i></button>
                        <button class="btn btn-icon-only" id="zoom-reset"><i class="ph ph-arrows-out"></i></button>
                        <button class="btn btn-icon-only" id="zoom-in"><i class="ph ph-plus"></i></button>
                    </div>
                </div>

                <div class="control-group">
                    <span class="control-label">Detection Model</span>
                    <select id="model-select">
                        <option value="coco">General Objects (Coco-SSD)</option>
                        <option value="pose">Human Bodies (PoseNet)</option>
                        <option value="hand">Hands (HandPose)</option>
                    </select>
                </div>

                <div class="control-group">
                    <span class="control-label">Sensitivity</span>
                    <input type="range" id="conf-slider" min="10" max="95" value="60" style="width:100px;">
                </div>

                <div class="control-group">
                    <span class="control-label">System</span>
                    <div class="btn-row">
                        <button class="btn btn-alert" id="stop-btn"><i class="ph ph-stop-circle"></i> Stop</button>
                        <button class="btn" id="download-btn" style="border-color:var(--neon-accent); color:var(--neon-accent);">
                            <i class="ph ph-download"></i> JSON
                        </button>
                        <button class="btn btn-icon-only" id="close-x-btn" title="Close Menu"><i class="ph ph-x"></i></button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- Setup ---
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const zoomContainer = document.getElementById('zoom-container');
        const loader = document.getElementById('loader');
        
        // UI Refs
        const statusText = document.getElementById('status-text');
        const objCount = document.getElementById('obj-count');
        const confDisplay = document.getElementById('conf-display');
        
        // State
        let currentModel = 'coco';
        let models = { coco: null, pose: null, hand: null };
        let isRunning = false;
        let animationFrame;
        let detectionThreshold = 0.6;
        let zoomLevel = 1.0;
        let detectionLog = [];

        // --- Init ---
        async function loadCore() {
            try {
                // Pre-load generic model
                statusText.innerText = "LOADING MODEL...";
                models.coco = await cocoSsd.load();
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                statusText.innerText = "READY";
            } catch (e) {
                console.error(e);
                statusText.innerText = "LOAD ERROR";
            }
        }
        loadCore();

        // --- Detection Loop ---
        async function detect() {
            if (!isRunning || video.paused || video.ended) return;

            // 1. Resize Canvas to Video
            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // 2. Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 3. Inference
            let detectedObjects = [];
            
            try {
                if (currentModel === 'coco' && models.coco) {
                    const predictions = await models.coco.detect(video);
                    detectedObjects = predictions.filter(p => p.score >= detectionThreshold).map(p => ({
                        box: p.bbox,
                        label: p.class,
                        score: p.score
                    }));
                } 
                else if (currentModel === 'pose') {
                    if(!models.pose) models.pose = await posenet.load(); // Lazy load
                    const pose = await models.pose.estimateSinglePose(video);
                    if(pose.score >= detectionThreshold) {
                        // Estimate bounding box from keypoints
                        const xs = pose.keypoints.map(k => k.position.x);
                        const ys = pose.keypoints.map(k => k.position.y);
                        const minX = Math.min(...xs);
                        const maxX = Math.max(...xs);
                        const minY = Math.min(...ys);
                        const maxY = Math.max(...ys);
                        detectedObjects.push({
                            box: [minX, minY, maxX - minX, maxY - minY],
                            label: "Human",
                            score: pose.score
                        });
                    }
                }
                else if (currentModel === 'hand') {
                    if(!models.hand) models.hand = await handpose.load(); // Lazy load
                    const hands = await models.hand.estimateHands(video);
                    if(hands.length > 0) {
                        hands.forEach(hand => {
                            if(hand.handInViewConfidence >= detectionThreshold) {
                                const box = hand.boundingBox; // [topLeft, bottomRight]
                                const w = box.bottomRight[0] - box.topLeft[0];
                                const h = box.bottomRight[1] - box.topLeft[1];
                                detectedObjects.push({
                                    box: [box.topLeft[0], box.topLeft[1], w, h],
                                    label: "Hand",
                                    score: hand.handInViewConfidence
                                });
                            }
                        });
                    }
                }
            } catch (err) {
                console.warn("Inference hiccup", err);
            }

            // 4. Draw & Log
            objCount.innerText = detectedObjects.length;
            detectedObjects.forEach(obj => {
                drawBox(obj.box, obj.label, obj.score);
                logData(obj);
            });

            animationFrame = requestAnimationFrame(detect);
        }

        function drawBox(box, label, score) {
            const [x, y, w, h] = box;
            const color = currentModel === 'coco' ? '#00f3ff' : '#bc13fe';

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;

            // Label
            ctx.fillStyle = color;
            ctx.font = "bold 14px sans-serif";
            const text = `${label.toUpperCase()} ${Math.round(score*100)}%`;
            const tw = ctx.measureText(text).width;
            ctx.fillRect(x, y - 24, tw + 10, 24);
            ctx.fillStyle = "#000";
            ctx.fillText(text, x + 5, y - 7);
        }

        function logData(obj) {
            // Limit log size
            if(detectionLog.length > 2000) detectionLog.shift();
            detectionLog.push({
                time: Date.now(),
                type: currentModel,
                label: obj.label,
                confidence: obj.score,
                box: obj.box
            });
        }

        // --- Controls ---

        // 1. Sources
        document.getElementById('cam-btn').addEventListener('click', async () => {
            if(isRunning) stopSystem();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // Rear camera forced
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    startSystem();
                };
            } catch(e) { alert("Camera access denied or unavailable."); }
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            if(isRunning) stopSystem();
            const file = e.target.files[0];
            if(file) {
                video.srcObject = null;
                video.src = URL.createObjectURL(file);
                video.loop = true;
                video.onloadedmetadata = () => {
                    video.play();
                    startSystem();
                };
            }
        });

        function startSystem() {
            isRunning = true;
            statusText.innerText = "DETECTING...";
            statusText.style.color = "#0f0";
            detect();
        }

        function stopSystem() {
            isRunning = false;
            cancelAnimationFrame(animationFrame);
            video.pause();
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            ctx.clearRect(0,0,canvas.width, canvas.height);
            statusText.innerText = "STOPPED";
            statusText.style.color = "var(--neon-alert)";
        }
        document.getElementById('stop-btn').onclick = stopSystem;

        // 2. Zoom
        function updateZoom() {
            zoomContainer.style.transform = `scale(${zoomLevel})`;
        }
        document.getElementById('zoom-in').onclick = () => { 
            zoomLevel = Math.min(zoomLevel + 0.2, 4.0); updateZoom(); 
        };
        document.getElementById('zoom-out').onclick = () => { 
            zoomLevel = Math.max(zoomLevel - 0.2, 0.5); updateZoom(); 
        };
        document.getElementById('zoom-reset').onclick = () => { 
            zoomLevel = 1.0; updateZoom(); 
        };

        // 3. Settings
        document.getElementById('model-select').addEventListener('change', (e) => {
            currentModel = e.target.value;
            statusText.innerText = `MODEL: ${e.target.value.toUpperCase()}`;
        });

        document.getElementById('conf-slider').addEventListener('input', (e) => {
            detectionThreshold = e.target.value / 100;
            confDisplay.innerText = `${e.target.value}%`;
        });

        // 4. Download
        document.getElementById('download-btn').onclick = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(detectionLog, null, 2));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = `detection_scan_${Date.now()}.json`;
            a.click();
        };

        // 5. Menu UI
        const menuContainer = document.getElementById('menu-container');
        const toggleBtn = document.getElementById('toggle-btn');
        const closeXBtn = document.getElementById('close-x-btn');

        function toggleMenu() {
            menuContainer.classList.toggle('collapsed');
            const icon = toggleBtn.querySelector('i');
            if(menuContainer.classList.contains('collapsed')) {
                icon.className = "ph ph-caret-up";
            } else {
                icon.className = "ph ph-caret-down";
            }
        }

        toggleBtn.onclick = toggleMenu;
        closeXBtn.onclick = () => menuContainer.classList.add('collapsed');

    </script>
</body>
</html>
