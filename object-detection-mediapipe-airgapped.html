<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object Detection • MediaPipe Tasks</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: #0b1021;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .app {
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 18px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
      width: 100%;
      max-width: 1100px;
      overflow: hidden;
    }
    .header {
      padding: 20px 24px 10px;
      border-bottom: 1px solid #1f2937;
    }
    .title { font-size: 20px; font-weight: 700; margin: 0; color: #f8fafc; }
    .subtitle { margin: 6px 0 0; color: #94a3b8; font-size: 14px; }
    .controls {
      display: flex;
      gap: 12px;
      padding: 14px 24px 20px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #1f2937;
    }
    .controls input[type="file"] { color: #94a3b8; }
    .button {
      padding: 10px 16px;
      background: linear-gradient(135deg, #22d3ee, #6366f1);
      color: #0b1021;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }
    .button:disabled { opacity: 0.5; cursor: not-allowed; }
    .button:not(:disabled):hover { transform: translateY(-1px); }
    .status {
      margin-left: auto;
      color: #cbd5e1;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 220px;
    }
    .pill { width: 10px; height: 10px; border-radius: 999px; background: #22c55e; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2); }
    .status.error .pill { background: #f43f5e; box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.2); }
    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      min-height: 520px;
    }
    .preview {
      position: relative;
      background: #0b1223;
      border-right: 1px solid #1f2937;
    }
    video, canvas { width: 100%; display: block; }
    video { max-height: 70vh; object-fit: contain; background: #0b1021; }
    canvas { position: absolute; inset: 0; pointer-events: none; }
    .log {
      padding: 16px;
      overflow-y: auto;
      max-height: 70vh;
    }
    .log h3 { margin: 0 0 10px; font-size: 14px; color: #cbd5e1; }
    .log-item {
      padding: 10px 12px;
      border: 1px solid #1f2937;
      border-radius: 12px;
      background: #0b1223;
      color: #e2e8f0;
      margin-bottom: 10px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .badge { padding: 4px 8px; border-radius: 10px; background: #111827; color: #a5b4fc; font-weight: 700; }
    .footer { padding: 14px 20px; border-top: 1px solid #1f2937; color: #94a3b8; font-size: 13px; }
    @media (max-width: 960px) { .main { grid-template-columns: 1fr; } .preview { border-right: none; border-bottom: 1px solid #1f2937; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <p class="title">Object Detection • MediaPipe Tasks</p>
      <p class="subtitle">Upload a video, then run on-device detection with the EfficientDet Lite model.</p>
    </div>

    <div class="controls">
      <input type="file" id="videoInput" accept="video/*" />
      <button class="button" id="startBtn" disabled>Start Detection</button>
      <button class="button" id="stopBtn" disabled>Stop</button>
      <div class="status" id="status"><span class="pill"></span><span>Model loading...</span></div>
    </div>

    <div class="main">
      <div class="preview">
        <video id="video" muted playsinline></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="log" id="log">
        <h3>Detections</h3>
        <div id="logItems"></div>
      </div>
    </div>

    <div class="footer">Runs fully in-browser using MediaPipe Tasks and the EfficientDet Lite model.</div>
  </div>

  <script type="module">
    // MediaPipe Tasks vision bundle (ESM)
    // For air-gapped/offline use: place the `vision_bundle.mjs` file in the same folder
    // and the `wasm/` runtime folder next to this HTML file, then import locally.
    import { FilesetResolver, ObjectDetector, DrawingUtils } from './vision_bundle.mjs';

    const videoInput = document.getElementById('videoInput');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const videoEl = document.getElementById('video');
    const canvasEl = document.getElementById('overlay');
    const ctx = canvasEl.getContext('2d');
    const logItems = document.getElementById('logItems');

    // Local model file (place `efficientdet_lite0.tflite` in the same folder as this HTML)
    // Example: ./efficientdet_lite0.tflite
    const MODEL_URL = './efficientdet_lite0.tflite';
    let detector;
    let animationId;
    let running = false;

    setStatus('Model loading...', false);
    init();

    async function init() {
      try {
        // Use local wasm files for offline use. Place the `wasm/` directory from
        // the MediaPipe Tasks package next to this HTML file (./wasm).
        const vision = await FilesetResolver.forVisionTasks('./wasm');
        detector = await ObjectDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: MODEL_URL,
          },
          scoreThreshold: 0.35,
          maxResults: 10,
        });
        setStatus('Model ready. Upload a video.', false);
        startBtn.disabled = false;
      } catch (err) {
        console.error(err);
        setStatus('Failed to load model. Check console.', true);
      }
    }

    videoInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      videoEl.src = url;
      videoEl.onloadedmetadata = () => {
        videoEl.muted = true;
        videoEl.play();
        resizeCanvas();
        setStatus('Video loaded. Click Start Detection.', false);
        startBtn.disabled = false;
      };
    });

    startBtn.addEventListener('click', () => {
      if (!detector || !videoEl.src) return;
      running = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      setStatus('Detecting...', false);
      detectFrame();
    });

    stopBtn.addEventListener('click', stopDetection);

    function stopDetection() {
      running = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      cancelAnimationFrame(animationId);
      setStatus('Stopped.', false);
    }

    function resizeCanvas() {
      canvasEl.width = videoEl.videoWidth;
      canvasEl.height = videoEl.videoHeight;
    }

    async function detectFrame() {
      if (!running) return;
      if (videoEl.readyState < 2) {
        animationId = requestAnimationFrame(detectFrame);
        return;
      }

      const detections = await detector.detect(videoEl);
      drawDetections(detections.detections || []);
      animationId = requestAnimationFrame(detectFrame);
    }

    function drawDetections(detections) {
      ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
      logItems.innerHTML = '';

      detections.forEach((det) => {
        const box = det.boundingBox;
        const categories = det.categories || [];
        const topCat = categories[0];

        if (box) {
          ctx.save();
          ctx.strokeStyle = '#22d3ee';
          ctx.lineWidth = 3;
          ctx.lineJoin = 'round';
          ctx.strokeRect(box.originX, box.originY, box.width, box.height);
          ctx.restore();
        }

        if (topCat && box) {
          const label = `${topCat.categoryName} ${(topCat.score * 100).toFixed(1)}%`;
          ctx.save();
          ctx.font = '14px "SFMono-Regular", Menlo, Consolas, monospace';
          const padding = 6;
          const metrics = ctx.measureText(label);
          const textWidth = metrics.width;
          const textHeight = 16; // approximate height
          const x = box.originX;
          const y = Math.max(box.originY - textHeight - 4, 0);

          ctx.fillStyle = 'rgba(15, 23, 42, 0.92)';
          ctx.fillRect(x - padding / 2, y, textWidth + padding, textHeight + padding / 2);

          ctx.fillStyle = '#22d3ee';
          ctx.textBaseline = 'top';
          ctx.fillText(label, x, y + 4);
          ctx.restore();

          const item = document.createElement('div');
          item.className = 'log-item';
          item.innerHTML = `<span>${topCat.categoryName}</span><span class="badge">${(topCat.score * 100).toFixed(1)}%</span>`;
          logItems.appendChild(item);
        }
      });
    }

    function setStatus(text, isError) {
      statusEl.classList.toggle('error', !!isError);
      statusEl.innerHTML = `<span class="pill"></span><span>${text}</span>`;
    }
  </script>
</body>
</html>
